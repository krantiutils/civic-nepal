name: NagarikPatro
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: bottom

packages:
  CalendarCore:
    path: CalendarCore

targets:
  NagarikPatro:
    type: application
    platform: macOS
    sources:
      - path: NagarikPatro
        excludes:
          - "Resources/*.json"
    resources:
      - path: NagarikPatro/Resources/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: NagarikPatro/Info.plist
        CODE_SIGN_ENTITLEMENTS: NagarikPatro/NagarikPatro.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.nagarikpatro.menubar
        PRODUCT_NAME: Nagarik Patro
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - package: CalendarCore
      - target: NagarikPatroWidget

  NagarikPatroTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NagarikPatroTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nagarik Patro.app/Contents/MacOS/Nagarik Patro"
    dependencies:
      - target: NagarikPatro

  NagarikPatroWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: NagarikPatroWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nagarikpatro.menubar.widget
        PRODUCT_NAME: NagarikPatroWidget
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: NagarikPatroWidget/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: NagarikPatroWidget/NagarikPatroWidget.entitlements
    dependencies:
      - package: CalendarCore
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

schemes:
  NagarikPatro:
    build:
      targets:
        NagarikPatro: all
        NagarikPatroTests: [test]
        NagarikPatroWidget: all
    test:
      targets:
        - NagarikPatroTests
